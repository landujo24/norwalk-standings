<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Baseball Standings</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:   #0a1628;
      --grass:   #0d1f3c;
      --lime:    #ffffff;
      --chalk:   #ffffff;
      --dirt:    #cc0000;
      --red:     #cc0000;
      --bg:      #060e1e;
      --card:    #0d1a30;
      --border:  #1e3058;
      --text:    #e8edf5;
      --muted:   #8fa8cc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Diamond texture background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,.012) 40px, rgba(255,255,255,.012) 41px),
        repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,.012) 40px, rgba(255,255,255,.012) 41px);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    /* Header */
    header {
      display: flex;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 36px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 20px;
    }

    .diamond-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 0.06em;
      color: var(--chalk);
      line-height: 1;
    }

    .header-text p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .refresh-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 3px;
      text-transform: uppercase;
      transition: all .2s;
      align-self: center;
    }
    .refresh-btn:hover { border-color: var(--lime); color: var(--lime); }

    /* Status bar */
    #status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
      min-height: 1.2em;
    }
    #status.error { color: var(--red); }

    /* Table container */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.45);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--green);
      border-bottom: 2px solid var(--grass);
    }

    th {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--lime);
      padding: 13px 16px;
      text-align: center;
      white-space: nowrap;
    }
    th.team-col { text-align: left; }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,.05);
      transition: background .15s;
      animation: fadeRow .4s ease both;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(116,198,157,.06); }

    @keyframes fadeRow {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    td {
      padding: 13px 16px;
      font-size: 0.9rem;
      text-align: center;
      color: var(--text);
    }
    td.team-col {
      text-align: left;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--chalk);
    }

    /* rank badge */
    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      margin-right: 10px;
    }
    tbody tr:first-child .rank {
      background: var(--dirt);
      color: #1a1a1a;
    }

    /* win pct styling */
    td.pct { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; }

    /* GB — leader shows dash */
    td.gb  { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; color: var(--muted); }
    td.gb.leader { color: var(--lime); font-weight: 600; }

    /* W / L / T */
    td.wins  { color: #cc0000; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
    td.loss  { color: #e07070; font-family: 'IBM Plex Mono', monospace; }
    td.ties  { font-family: 'IBM Plex Mono', monospace; color: var(--muted); }

    /* Loading skeleton */
    .skeleton-row td {
      padding: 13px 16px;
    }
    .skel {
      height: 14px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,.04) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Footer note */
    .footer {
      margin-top: 18px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      opacity: .6;
      text-align: right;
      letter-spacing: 0.06em;
    }

    /* Responsive */
    @media (max-width: 520px) {
      th, td { padding: 10px 10px; font-size: 0.8rem; }
      td.team-col { font-size: 0.85rem; }
      .rank { width: 20px; height: 20px; font-size: 0.62rem; margin-right: 6px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <!-- Baseball diamond SVG icon -->
    <svg class="diamond-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="26" y="4" width="22" height="22" rx="2" transform="rotate(45 26 4)" fill="#0d1f3c" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="26" cy="26" r="5" fill="#cc0000" stroke="#ffffff" stroke-width="1.2"/>
      <circle cx="26" cy="10" r="3" fill="#ffffff"/>
      <circle cx="42" cy="26" r="3" fill="#ffffff"/>
      <circle cx="26" cy="42" r="3" fill="#ffffff"/>
      <circle cx="10"  cy="26" r="3" fill="#ffffff"/>
    </svg>

    <div class="header-text">
      <h1>Minor A Norwalk Little League</h1>
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,3vw,1.6rem);letter-spacing:0.08em;color:var(--lime);line-height:1;margin-top:4px;">Standings</h2>
      <p id="subtitle">Loading season data…</p>
    </div>
    <button class="refresh-btn" onclick="loadStandings()">↻ Refresh</button>
  </header>

  <div id="status"></div>

  <div class="table-wrap">
    <table id="standings-table">
      <thead>
        <tr id="header-row">
          <!-- filled dynamically -->
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- skeleton rows -->
        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td></tr>
        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td></tr>
        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td></tr>
        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer" id="footer-note"></div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vROwsIzqJxfbpifqR0Wf2GKyMLzXhM6CebaHxoVRSWAEr_5Sm735RrX5E4DgYwW31i1TY5SsbnyHD71/pub?gid=0&single=true&output=csv";

  function parseCSV(text) {
    const lines = text.trim().split('\n').map(l => l.replace(/\r/g, ''));
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = cols[i] ?? '');
      return obj;
    });
    return { headers, rows };
  }

  function findCol(headers, ...candidates) {
    for (const c of candidates) {
      const found = headers.find(h => h.toLowerCase().replace(/[^a-z0-9]/g,'').includes(c.toLowerCase().replace(/[^a-z0-9]/g,'')));
      if (found) return found;
    }
    return null;
  }

  function calcGB(leaderW, leaderL, w, l) {
    return ((leaderW - w) + (l - leaderL)) / 2;
  }

  function formatPct(w, l) {
    const g = parseInt(w) + parseInt(l);
    if (!g) return '.000';
    const p = parseInt(w) / g;
    return p === 1 ? '1.000' : p.toFixed(3).replace('0.', '.');
  }

  async function loadStandings() {
    const status = document.getElementById('status');
    const body   = document.getElementById('table-body');
    const hrow   = document.getElementById('header-row');
    status.textContent = 'Fetching latest data…';
    status.className = '';

    // Reset to skeleton
    body.innerHTML = Array(4).fill(`<tr class="skeleton-row">${Array(5).fill('<td><div class="skel"></div></td>').join('')}</tr>`).join('');
    hrow.innerHTML = '';

    try {
      // Try direct fetch first, then fall back to CORS proxies
      let text = null;
      let lastErr = null;

      const attempts = [
        () => fetch(CSV_URL + '&cachebust=' + Date.now(), { cache: 'no-store' }),
        () => fetch('https://corsproxy.io/?' + encodeURIComponent(CSV_URL)),
        () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL)),
      ];

      for (const attempt of attempts) {
        try {
          const res = await attempt();
          if (res.ok) { text = await res.text(); break; }
        } catch (e) { lastErr = e; }
      }

      if (!text) throw new Error(lastErr?.message || 'All fetch attempts failed. Make sure your sheet is published as CSV.');
      const { headers, rows } = parseCSV(text);

      if (!rows.length) throw new Error('No data rows found in sheet.');

      // Detect columns
      const teamCol = findCol(headers, 'team','name','club','organization') || headers[0];
      const wCol    = findCol(headers, 'w','wins','win');
      const lCol    = findCol(headers, 'l','loss','losses');
      const tCol    = findCol(headers, 't','tie','ties','draw');

      if (!teamCol || !wCol || !lCol) throw new Error('Could not find required W / L columns in your sheet. Make sure columns are labelled W and L.');

      // Sort by wins desc, losses asc
      rows.sort((a, b) => {
        const wDiff = parseInt(b[wCol]||0) - parseInt(a[wCol]||0);
        if (wDiff !== 0) return wDiff;
        return parseInt(a[lCol]||0) - parseInt(b[lCol]||0);
      });

      const leaderW = parseInt(rows[0][wCol] || 0);
      const leaderL = parseInt(rows[0][lCol] || 0);

      // Build header
      const colDefs = [
        { label: '#',    key: 'rank',  cls: '' },
        { label: 'Team', key: 'team',  cls: 'team-col' },
        { label: 'W',    key: 'w',     cls: '' },
        { label: 'L',    key: 'l',     cls: '' },
        ...(tCol ? [{ label: 'T', key: 't', cls: '' }] : []),
        { label: 'PCT',  key: 'pct',   cls: '' },
        { label: 'GB',   key: 'gb',    cls: '' },
      ];

      hrow.innerHTML = colDefs.map(c => `<th class="${c.cls || ''}">${c.label}</th>`).join('');

      // Assign ranks — tied records share the same rank (e.g. T-1, T-3)
      const rankLabels = [];
      rows.forEach((row, i) => {
        const w = parseInt(row[wCol] || 0);
        const l = parseInt(row[lCol] || 0);
        if (i === 0) {
          rankLabels.push(1);
        } else {
          const prevW = parseInt(rows[i - 1][wCol] || 0);
          const prevL = parseInt(rows[i - 1][lCol] || 0);
          rankLabels.push(w === prevW && l === prevL ? rankLabels[i - 1] : i + 1);
        }
      });
      const hasTiedRanks = rankLabels.some((r, i) => rankLabels.indexOf(r) !== i);

      // Build rows
      body.innerHTML = '';
      rows.forEach((row, i) => {
        const w   = parseInt(row[wCol] || 0);
        const l   = parseInt(row[lCol] || 0);
        const t   = tCol ? (parseInt(row[tCol]) || 0) : 0;
        const gb  = i === 0 ? '—' : calcGB(leaderW, leaderL, w, l).toFixed(1);
        const pct = formatPct(w, l);

        const rankNum     = rankLabels[i];
        const isTied      = hasTiedRanks && rankLabels.filter(r => r === rankNum).length > 1;
        const rankDisplay = isTied ? 'T-' + rankNum : '' + rankNum;
        const isLeader    = rankNum === 1;

        const tr = document.createElement('tr');
        tr.style.animationDelay = (i * 55) + 'ms';

        tr.innerHTML =
          '<td><span class="rank" style="' + (isTied ? 'width:auto;padding:0 6px;border-radius:4px;font-size:0.62rem;' : '') + '">' + rankDisplay + '</span></td>' +
          '<td class="team-col">' + (row[teamCol] || '—') + '</td>' +
          '<td class="wins">' + w + '</td>' +
          '<td class="loss">' + l + '</td>' +
          (tCol ? '<td class="ties">' + t + '</td>' : '') +
          '<td class="pct">' + pct + '</td>' +
          '<td class="gb ' + (isLeader ? 'leader' : '') + '">' + gb + '</td>';

        body.appendChild(tr);
      });

      status.textContent = `${rows.length} teams · Updated ${new Date().toLocaleTimeString()}`;
      document.getElementById('subtitle').textContent = 'Current Season';
      document.getElementById('footer-note').textContent = `Source: Google Sheets · ${new Date().toLocaleDateString()}`;

    } catch (err) {
      status.textContent = `Error: ${err.message}`;
      status.className = 'error';
      body.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.8rem;">Could not load standings data.</td></tr>`;
      console.error(err);
    }
  }

  loadStandings();
</script>
</body>
</html>
